name: 每日早安推送

on:
  schedule:
    # 避开00:00整点高峰，改为UTC时间 23:35，对应北京时间次日早上 07:35
    - cron: '37 22 * * *'
  workflow_dispatch:  # 允许手动点击测试

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install requests zhdate
      
      - name: 发送消息
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          OPEN_ID: ${{ secrets.OPEN_ID }}
          TEMPLATE_ID: ${{ secrets.TEMPLATE_ID }}
          TIANAPI_KEY: ${{ secrets.TIANAPI_KEY }}
        run: python wechat_love.py
